pre-commit:
  commands:
    lint:
      glob: '*.{ts,tsx}'
      run: npx eslint --fix {staged_files}
      stage_fixed: true
      priority: 1

    format-ts:
      glob: '*.{ts,tsx}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
      priority: 2

    format-assets:
      glob: '*.{json,css}'
      run: npx prettier --write {staged_files}
      stage_fixed: true
